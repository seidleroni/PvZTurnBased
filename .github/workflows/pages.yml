name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check JavaScript syntax
        run: node --check src/garden_guard/static/game.js

      - name: Build static site
        shell: bash
        run: |
          mkdir -p dist
          cp -R src/garden_guard/static/. dist/
          printf '{"version":"%s","commit":"%s","builtAt":"%s"}\n' "${GITHUB_SHA::7}" "$GITHUB_SHA" "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > dist/version.json
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
